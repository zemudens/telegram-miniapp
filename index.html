<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Archive App</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
body {
  margin:0;
  background:black;
  color:white;
  font-family:sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:360px;
  height:640px;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  border:1px solid rgba(255,255,255,0.1);
}

.page {
  display:none;
  padding:20px;
  text-align:center;
}

.active {
  display:block;
}

button {
  padding:10px;
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:10px;
  background:#1a2a6c;
  color:white;
}

.nav {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:0 20px;
}

.modal {
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box {
  background:rgba(255,255,255,0.1);
  padding:20px;
  border-radius:10px;
}

.rotate {
  animation:spin 3s linear infinite;
}

@keyframes spin {
  from { transform:rotate(0deg); }
  to { transform:rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

  <!-- PAGE 1 -->
  <div class="page active">
    <h1>2026 ARCHIVE</h1>
    <p>A quiet space to store feelings</p>
  </div>

  <!-- PAGE 2 -->
  <div class="page">
    <p>This is a safe space</p>
  </div>

  <!-- PAGE 3 -->
  <div class="page">
    <div id="cd">💿</div>
    <p>Status: Active</p>
  </div>

  <!-- PAGE 4 -->
  <div class="page">
    <p>What if we redefine it?</p>
  </div>

  <!-- PAGE 5 -->
  <div class="page">
    <button onclick="openModal()">Take the Risk</button>
    <button onclick="openModal()">Keep It Here</button>
  </div>

  <!-- PAGE 6 -->
  <div class="page">
    <div onclick="toggleAudio()" id="audioBtn">🎸</div>
    <audio id="audio" src="song.mp3"></audio>
  </div>

  <!-- NAV -->
  <div class="nav">
    <button onclick="prev()">Back</button>
    <button onclick="next()">Next</button>
  </div>

  <!-- MODAL -->
  <div class="modal" id="modal">
    <div class="modal-box">
      <p>Call me now.</p>
      <button onclick="closeModal()">Close</button>
    </div>
  </div>

</div>

<script>
let page = 0;
const pages = document.querySelectorAll(".page");
const audio = document.getElementById("audio");
const btn = document.getElementById("audioBtn");

function showPage() {
  pages.forEach(p => p.classList.remove("active"));
  pages[page].classList.add("active");
}

function next() {
  if(page < pages.length - 1){
    page++;
    showPage();
  }
}

function prev() {
  if(page > 0){
    page--;
    showPage();
  }
}

function openModal(){
  document.getElementById("modal").style.display="flex";
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

let playing = false;

function toggleAudio(){
  playing = !playing;
  if(playing){
    audio.play();
    btn.classList.add("rotate");
  } else {
    audio.pause();
    btn.classList.remove("rotate");
  }
}

// Telegram init
if(window.Telegram){
  Telegram.WebApp.expand();
}
</script>

</body>
</html>
